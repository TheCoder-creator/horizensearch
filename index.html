<style>
:root{
    --bg:#050505;
    --nav:#121212;
    --accent:#00eb84;
    --card:rgba(20,20,20,0.95);
    --text:#ffffff;
    --border:#333;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
    background-size:cover;
    background-position:center;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* TABS */

#tab-bar{
    background:rgba(18,18,18,0.88);
    backdrop-filter:blur(12px);
    display:flex;
    padding:8px 10px 0;
    gap:5px;
    border-bottom:1px solid var(--border);
    min-height:42px;
    z-index:10001;
}

.tab{
    background:rgba(255,255,255,0.05);
    padding:8px 15px;
    border-radius:8px 8px 0 0;
    font-size:12px;
    cursor:pointer;
    border:1px solid var(--border);
    border-bottom:none;
    color:#888;
    min-width:120px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.tab.active{
    background:var(--bg);
    border-color:var(--accent);
    color:var(--accent);
    font-weight:bold;
}

.close-tab{
    margin-left:10px;
    cursor:pointer;
}

/* NAV */

#nav-tools{
    background:var(--nav);
    padding:10px;
    display:flex;
    gap:10px;
    border-bottom:1px solid var(--border);
    align-items:center;
    z-index:10001;
}

#addr-bar{
    flex-grow:1;
    padding:10px 20px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#1a1a1a;
    color:white;
    outline:none;
}

.btn{
    background:var(--accent);
    color:black;
    border:none;
    padding:10px 18px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

/* STATUS */

#status-bar{
    display:flex;
    gap:15px;
    padding:0 15px;
    font-size:13px;
    color:#aaa;
    white-space:nowrap;
}

.status-item{
    display:flex;
    align-items:center;
    gap:5px;
}

#time{
    color:var(--accent);
    font-weight:bold;
}

/* VIEW */

#viewport{
    flex-grow:1;
    position:relative;
}

.view-pane{
    position:absolute;
    inset:0;
    display:none;
}

.view-pane.active{
    display:block;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

/* HOME */

#home-view{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    height:100%;
    padding-top:10vh;
    overflow-y:auto;
    backdrop-filter:brightness(0.55);
}

.logo{
    font-size:5rem;
    font-weight:900;
    color:var(--accent);
    letter-spacing:-4px;
    text-shadow:0 0 30px rgba(0,235,132,0.3);
}

.mid-search{
    width:90%;
    max-width:560px;
    background:var(--card);
    padding:12px 25px;
    border-radius:50px;
    border:1px solid var(--border);
    display:flex;
    gap:10px;
    margin-top:20px;
}

.mid-search input{
    flex-grow:1;
    background:none;
    border:none;
    color:white;
    outline:none;
    font-size:1.05rem;
}

/* POPULAR */

.popular-section{
    margin-top:40px;
    width:90%;
    max-width:700px;
    text-align:center;
}

.popular-title{
    font-size:13px;
    color:#777;
    margin-bottom:15px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.popular-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.popular-link{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    padding:10px 18px;
    border-radius:14px;
    color:#ccc;
    cursor:pointer;
    transition:0.2s;
    display:flex;
    align-items:center;
    gap:8px;
}

.popular-link:hover{
    border-color:var(--accent);
    color:var(--accent);
    transform:translateY(-2px);
}

/* RESULTS */

.results-wrapper{
    max-width:850px;
    margin:0 auto;
    padding:20px;
    overflow-y:auto;
    height:100%;
}

.filter-bar{
    display:flex;
    gap:5px;
    border-bottom:1px solid var(--border);
    margin-bottom:25px;
}

.filter-btn{
    background:none;
    border:none;
    padding:12px 15px;
    color:#888;
    cursor:pointer;
    border-bottom:2px solid transparent;
}

.filter-btn.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
}

.content-section{
    display:none;
}

.content-section.active{
    display:block;
}

.ai-overview-box{
    background:#12151c;
    border:1px solid #2a2e3a;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:25px;
}

.ai-overview-header{
    padding:15px 20px;
    background:#1a1e28;
    display:flex;
    gap:10px;
    color:var(--accent);
    border-bottom:1px solid #2a2e3a;
}

.ai-overview-content{
    padding:20px;
    color:#ccc;
    line-height:1.7;
}

.image-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
}

.image-grid img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.image-grid img:hover{
    transform:scale(1.03);
}

/* CONTEXT */

#context-menu{
    position:fixed;
    display:none;
    background:var(--nav);
    border:1px solid var(--accent);
    border-radius:10px;
    z-index:20000;
    min-width:170px;
    overflow:hidden;
}

.menu-item{
    padding:12px 20px;
    cursor:pointer;
}

.menu-item:hover{
    background:var(--accent);
    color:black;
}

/* WALLPAPER */

#wp-picker{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80%;
    max-width:720px;
    height:70vh;
    background:var(--card);
    border:1px solid var(--accent);
    border-radius:24px;
    display:none;
    flex-direction:column;
    padding:25px;
    z-index:10002;
    backdrop-filter:blur(30px);
}

#wp-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    overflow-y:auto;
    margin-top:15px;
}

.wp-item{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
}

/* ADDRESS */

#hz-addr-display{
    position:fixed;
    bottom:15px;
    left:15px;
    background:rgba(10,10,15,0.88);
    border:1px solid #333;
    border-radius:8px;
    padding:8px 14px;
    font-family:monospace;
    font-size:12px;
    color:#777;
    z-index:9999;
    cursor:pointer;
    transition:0.2s;
    display:flex;
    align-items:center;
    gap:8px;
}

#hz-addr-display:hover{
    border-color:var(--accent);
    color:var(--accent);
}

/* BROADCAST */

#hz-top-broadcast{
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    min-width:340px;
    max-width:80%;
    background:rgba(15,15,15,0.96);
    border:1px solid var(--accent);
    border-radius:18px;
    padding:15px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    z-index:999999;
    transition:0.4s ease;
}

#hz-top-broadcast.show{
    top:20px;
}

#hz-top-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--accent);
}

#hz-top-message{
    flex:1;
    font-size:14px;
}

#hz-dismiss-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:10px;
    background:#1f1f1f;
    color:#aaa;
    cursor:pointer;
}

#hz-dismiss-btn:hover{
    background:#2a2a2a;
    color:white;
}
</style>
</head>

<script>
const PEXELS_KEY=
'QmebQALowGk9LoYQqUGaPhQ5zUMQWwd1mRaFTV4HvNQyYS1i6v9H5V68';

const SUPABASE_URL=
'https://xlisbmtenekjmundxbcn.supabase.co';

const SUPABASE_KEY=
'sb_publishable_Cvs-AiKPTHrC_tfGfwlpSQ_4Hir5Cva';

let openTabs=[];
let myAddress="";
let currentBroadcast="";
let dismissedBroadcast=
localStorage.getItem(
'dismissed_broadcast'
)||"";

/* STATUS */

function updateStatus(){

const now=new Date();

document.getElementById(
'time'
).innerText=
now.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

if(navigator.getBattery){

navigator.getBattery().then(bat=>{

document.getElementById(
'battery'
).innerText=
`🔋 ${Math.round(bat.level*100)}%`;

});
}
}

setInterval(updateStatus,1000);

/* GLOBAL COOKIE */

function setCookie(name,value,days){

let expires="";

if(days){

const date=new Date();

date.setTime(
date.getTime()+
(days*24*60*60*1000)
);

expires=
"; expires="+
date.toUTCString();
}

document.cookie=
name+"="+value+
expires+
"; path=/; domain=.horizensearch.com";
}

function getCookie(name){

const nameEQ=name+"=";

const ca=document.cookie.split(';');

for(let i=0;i<ca.length;i++){

let c=ca[i];

while(c.charAt(0)==' '){

c=c.substring(1,c.length);
}

if(c.indexOf(nameEQ)==0){

return c.substring(
nameEQ.length,
c.length
);
}
}

return null;
}

/* BLOCKER */

async function initHorizenBlocker(){

let address=
getCookie(
'horizen_global_address'
);

if(!address){

const digits=
Math.floor(
100000+
Math.random()*900000
);

address=
`horizen.play://${digits}`;

setCookie(
'horizen_global_address',
address,
3650
);

try{

await fetch(
`${SUPABASE_URL}/rest/v1/users`,
{
method:'POST',
headers:{
'apikey':SUPABASE_KEY,
'Content-Type':'application/json',
'Prefer':'return=minimal'
},
body:JSON.stringify({
address:address,
nickname:'Unknown',
is_blocked:false
})
}
);

}catch(e){}
}

myAddress=address;

document.getElementById(
'hz-addr-text'
).innerText=address;

checkBlocked();
}

async function checkBlocked(){

try{

const res=await fetch(
`${SUPABASE_URL}/rest/v1/users?address=eq.${encodeURIComponent(myAddress)}&select=is_blocked`,
{
headers:{
'apikey':SUPABASE_KEY
}
}
);

const data=await res.json();

if(
data.length>0 &&
data[0].is_blocked===true
){

window.location.href=
'https://blocked.horizensearch.com';
}

}catch(e){}
}

setInterval(checkBlocked,10000);

/* BROADCAST */

async function checkBroadcast(){

try{

const res=await fetch(
`${SUPABASE_URL}/rest/v1/broadcasts?enabled=eq.true&select=message`,
{
headers:{
'apikey':SUPABASE_KEY
}
}
);

const data=await res.json();

if(data.length>0){

const msg=data[0].message;

currentBroadcast=msg;

if(msg!==dismissedBroadcast){

showBroadcast(msg);
}

}else{

hideBroadcast();

localStorage.removeItem(
'dismissed_broadcast'
);
}

}catch(e){}
}

function showBroadcast(message){

document.getElementById(
'hz-top-message'
).innerText=message;

document.getElementById(
'hz-top-broadcast'
).classList.add('show');
}

function hideBroadcast(){

document.getElementById(
'hz-top-broadcast'
).classList.remove('show');
}

document.getElementById(
'hz-dismiss-btn'
).onclick=()=>{

dismissedBroadcast=
currentBroadcast;

localStorage.setItem(
'dismissed_broadcast',
currentBroadcast
);

hideBroadcast();
};

setInterval(checkBroadcast,5000);

/* CONTEXT */

function handleGlobalContextMenu(e){

e.preventDefault();

const menu=
document.getElementById(
'context-menu'
);

menu.style.display='block';

menu.style.left=e.pageX+'px';

menu.style.top=e.pageY+'px';
}

window.onclick=()=>{

document.getElementById(
'context-menu'
).style.display='none';
};

/* TABS */

function switchTab(id){

document.querySelectorAll(
'.view-pane'
).forEach(
p=>p.classList.remove('active')
);

document.querySelectorAll(
'.tab'
).forEach(
t=>t.classList.remove('active')
);

document.getElementById(
'view-'+id
).classList.add('active');

document.getElementById(
'tab-'+id
).classList.add('active');

document.getElementById(
'tab-'+id
).style.display='flex';
}

function openUrl(url,name){

createNewTab(name,null,url);
}

function createNewTab(name,html,url){

const safeId=
name.replace(/[^a-z0-9]/gi,'_');

if(openTabs.includes(safeId))
return switchTab(safeId);

const tab=document.createElement('div');

tab.className='tab';

tab.id='tab-'+safeId;

tab.innerHTML=
`🌐 ${name}
<span class="close-tab"
onclick="closeTab(event,'${safeId}')">
×
</span>`;

tab.onclick=
()=>switchTab(safeId);

document.getElementById(
'tab-bar'
).appendChild(tab);

const pane=document.createElement('div');

pane.className='view-pane';

pane.id='view-'+safeId;

const ifr=document.createElement('iframe');

if(url){
ifr.src=url;
}else{
ifr.srcdoc=html;
}

pane.appendChild(ifr);

document.getElementById(
'viewport'
).appendChild(pane);

openTabs.push(safeId);

switchTab(safeId);
}

function closeTab(e,id){

e.stopPropagation();

document.getElementById(
'tab-'+id
).remove();

document.getElementById(
'view-'+id
).remove();

openTabs=
openTabs.filter(t=>t!==id);

switchTab('home');
}

/* SEARCH */

function handleTopBar(){

const val=
document.getElementById(
'addr-bar'
).value.trim();

if(!val)return;

if(
val.startsWith('http://')||
val.startsWith('https://')
){

createNewTab(val,null,val);

}else if(val.includes(".")){

createNewTab(
val,
null,
"https://"+val
);

}else{

performSearch(val);
}
}

function switchFilter(id,btn){

document.querySelectorAll(
'.filter-btn'
).forEach(
b=>b.classList.remove('active')
);

document.querySelectorAll(
'.content-section'
).forEach(
s=>s.classList.remove('active')
);

btn.classList.add('active');

document.getElementById(
'content-'+id
).classList.add('active');
}

async function performSearch(customQuery){

const q=
customQuery||
document.getElementById(
'search-input'
).value;

if(!q)return;

switchTab('results');

document.getElementById(
'search-title'
).innerText=
"Results for: "+q;

fetch(
`https://api.pexels.com/v1/search?query=${q}&per_page=12`,
{
headers:{
Authorization:PEXELS_KEY
}
}
)
.then(r=>r.json())
.then(d=>{

const imgs=
d.photos.map(
p=>`
<img
src="${p.src.medium}"
onclick="setBG('${p.src.large2x}')">
`
).join('');

document.getElementById(
'all-images-preview'
).innerHTML=imgs;

document.getElementById(
'full-images-grid'
).innerHTML=imgs;
});

document.getElementById(
'inline-ai-box'
).innerHTML=
`
<div class="ai-overview-box">

<div class="ai-overview-header">
<i class="fas fa-sparkles"></i>
AI Overview
</div>

<div class="ai-overview-content">
AI summaries enabled.
</div>

</div>
`;
}

/* WALLPAPER */

function toggleWPPicker(){

const p=
document.getElementById(
'wp-picker'
);

p.style.display=
(p.style.display==='flex')
?'none'
:'flex';
}

function setBG(url){

document.body.style.backgroundImage=
`url('${url}')`;

localStorage.setItem(
'horizon_bg',
url
);
}

function resetBG(){

document.body.style.backgroundImage=
'none';

localStorage.removeItem(
'horizon_bg'
);
}

document.getElementById(
'wp-search'
).onkeypress=e=>{

if(e.key==='Enter'){

fetch(
`https://api.pexels.com/v1/search?query=${e.target.value}&per_page=20`,
{
headers:{
Authorization:PEXELS_KEY
}
}
)
.then(r=>r.json())
.then(d=>{

document.getElementById(
'wp-grid'
).innerHTML=
d.photos.map(
p=>`
<img
src="${p.src.medium}"
class="wp-item"
onclick="setBG('${p.src.large2x}')">
`
).join('');
});
}
};

/* COPY */

function copyAddress(){

navigator.clipboard.writeText(
myAddress
);

const el=
document.getElementById(
'hz-addr-text'
);

el.innerText='Copied!';

setTimeout(()=>{

el.innerText=myAddress;

},1500);
}

/* ENTER */

document.getElementById(
'addr-bar'
).onkeypress=e=>{

if(e.key==='Enter')
handleTopBar();
};

document.getElementById(

).onkeypress=e=>{

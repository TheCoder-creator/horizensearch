    const PEXELS_KEY = 'QmebQALowGk9LoYQqUGaPhQ5zUMQWwd1mRaFTV4HvNQyYS1i6v9H5V68';

    const SUPABASE_KEY = 'sb_publishable_Cvs-AiKPTHrC_tfGfwlpSQ_4Hir5Cva';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let openTabs = [];
    let myAddress = '';
    let blockChannel = null;
    let appCache = [];
    let blockPollInterval = null;

    async function generateFingerprint() {
      let raw = '';
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('HorizonFP_fingerprint_test', 2, 2);
        ctx.beginPath();
        ctx.arc(50, 50, 50, 0, Math.PI * 2, false);
        ctx.fill();
        raw += canvas.toDataURL();
      } catch (e) {}
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
          const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
          if (debugInfo) {
            raw += gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
            raw += gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
          }
        }
      } catch (e) {}
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        raw += audioCtx.sampleRate + audioCtx.destination.maxChannelCount + audioCtx.state;
        audioCtx.close();
      } catch (e) {}
      try {
        if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
          const devices = await navigator.mediaDevices.enumerateDevices();
          let deviceCounts = { audioinput: 0, audiooutput: 0, videoinput: 0 };
          devices.forEach(d => { if (deviceCounts[d.kind] !== undefined) deviceCounts[d.kind]++; });
          raw += JSON.stringify(deviceCounts);
        }
      } catch (e) {}
      raw += navigator.hardwareConcurrency || 'na';
      raw += screen.width + 'x' + screen.height;
      raw += screen.colorDepth;
      raw += (navigator.deviceMemory || 'na');
      raw += (navigator.platform || 'na');
      raw += new Date().getTimezoneOffset();
      raw += navigator.language;
      raw += Intl.DateTimeFormat().resolvedOptions().timeZone;
      raw += (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      try {
        if (navigator.userAgentData) {
          const hints = await navigator.userAgentData.getHighEntropyValues([
            'platform', 'platformVersion', 'architecture', 'model', 'bitness', 'fullVersionList'
          ]);
          raw += JSON.stringify(hints);
        } else {
          raw += navigator.userAgent;
        }
      } catch (e) {
        raw += navigator.userAgent;
      }
      let hash1 = 0x811c9dc5;
      for (let i = 0; i < raw.length; i++) {
        hash1 ^= raw.charCodeAt(i);
        hash1 = Math.imul(hash1, 0x01000193);
      }
      let hash2 = 0x811c9dc5;
      const reversedRaw = raw.split('').reverse().join('');
      for (let i = 0; i < reversedRaw.length; i++) {
        hash2 ^= reversedRaw.charCodeAt(i);
        hash2 = Math.imul(hash2, 0x01000193);
      }
      const combinedHash = (hash1 >>> 0).toString(16) + (hash2 >>> 0).toString(16);
      return `hz-pc-${combinedHash.toUpperCase().substring(0, 16)}`;
    }

    async function checkIfBlocked(computerId) {
      try {
        const { data } = await sb.from('users').select('is_blocked').eq('computer_id', computerId).maybeSingle();
        if (data && data.is_blocked === true) {
          window.location.href = 'https://blocked.horizensearch.com';
          return true;
        }
      } catch (e) {}
      return false;
    }

    async function initHorizenBlocker() {
      let computerId = localStorage.getItem('horizen_computer_id');
      if (!computerId) {
        computerId = await generateFingerprint();
        localStorage.setItem('horizen_computer_id', computerId);
      }
      myAddress = computerId;
      document.getElementById('hz-addr-text').innerText = computerId;

      // Upsert this device into Supabase so it's visible to admins
      const { data: upsertData, error: upsertError } = await sb.from('users').upsert(
        { computer_id: computerId },
        { onConflict: 'computer_id', ignoreDuplicates: false }
      );
      if (upsertError) {
        console.error('[Horizon] Upsert failed:', upsertError);
      } else {
        console.log('[Horizon] Device registered/updated in Supabase:', computerId);
      }

      // Initial block check
      const blocked = await checkIfBlocked(computerId);
      if (blocked) return false;

      // Realtime subscription (instant push-based detection)
      if (blockChannel) await sb.removeChannel(blockChannel);
      blockChannel = sb.channel('user-block-watch')
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'users',
          filter: `computer_id=eq.${computerId}`
        }, payload => {
          if (payload.new && payload.new.is_blocked === true) {
            window.location.href = 'https://blocked.horizensearch.com';
          }
        })
        .subscribe();

      // Active poll every 2 seconds as a guaranteed fallback
      if (blockPollInterval) clearInterval(blockPollInterval);
      blockPollInterval = setInterval(() => checkIfBlocked(computerId), 2000);

      return true;
    }

    function copyAddress() {
      navigator.clipboard.writeText(myAddress).then(() => {
        const el = document.getElementById('hz-addr-text');
        el.innerText = 'Copied!';
        setTimeout(() => { el.innerText = myAddress; }, 1500);
      });
    }

    window.onload = async () => {
      const savedBG = localStorage.getItem('horizon_bg');
      if (savedBG) setBG(savedBG);
      updateStatus();
      const ok = await initHorizenBlocker();
      if (!ok) document.body.style.display = 'none';
      loadAppStore();
    };

    function updateStatus() {
      document.getElementById('time').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateStatus, 1000);

    function handleGlobalContextMenu(e) {
      e.preventDefault();
      const menu = document.getElementById('context-menu');
      menu.style.display = 'block';
      menu.style.left = e.pageX + 'px';
      menu.style.top = e.pageY + 'px';
    }

    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function switchTab(id) {
      document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
      document.getElementById('tab-' + id).style.display = 'flex';
      if (id === 'store') loadAppStore();
    }

    async function cleanUrl(input) {
      let u = input.startsWith('http://') || input.startsWith('https://') ? input : 'https://' + input;
      try {
        const url = new URL(u);
        url.search = '';
        url.hash = '';
        return url.toString();
      } catch (e) {
        return u;
      }
    }

    function openUrl(url, tabName) {
      createNewTab(tabName, null, url);
    }

    async function handleTopBar() {
      const val = document.getElementById('addr-bar').value.trim();
      if (!val) return;
      if (val.startsWith('http://') || val.startsWith('https://') || val.includes('.')) {
        const full = val.includes('://') ? val : 'https://' + val;
        const shortUrl = await cleanUrl(full);
        createNewTab(shortUrl, null, shortUrl);
      } else {
        performSearch(val);
      }
    }

    function createNewTab(name, html, url) {
      const safeId = 'tab_' + Math.random().toString(36).slice(2, 10);
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.id = 'tab-' + safeId;
      tab.innerHTML = `🌐 ${name} <span class="close-tab" onclick="closeTab(event, '${safeId}')">×</span>`;
      tab.onclick = () => switchTab(safeId);
      document.getElementById('tab-bar').appendChild(tab);

      const pane = document.createElement('div');
      pane.className = 'view-pane';
      pane.id = 'view-' + safeId;
      const ifr = document.createElement('iframe');
      if (html !== null) ifr.srcdoc = html;
      else ifr.src = url;
      pane.appendChild(ifr);
      document.getElementById('viewport').appendChild(pane);
      openTabs.push(safeId);
      switchTab(safeId);
    }

    function closeTab(e, id) {
      e.stopPropagation();
      document.getElementById('tab-' + id)?.remove();
      document.getElementById('view-' + id)?.remove();
      openTabs = openTabs.filter(t => t !== id);
      switchTab('home');
    }

    function switchFilter(filterId, btnElem) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
      btnElem.classList.add('active');
      document.getElementById('content-' + filterId).classList.add('active');
    }

    async function performSearch(customQuery) {
      const q = customQuery || document.getElementById('search-input').value;
      if (!q) return;
      document.getElementById('search-title').innerText = 'Results for: ' + q;
      switchTab('results');
      document.getElementById('inline-ai-box').innerText = 'Search results loaded.';
      document.getElementById('all-images-preview').innerHTML = '';
      document.getElementById('full-images-grid').innerHTML = '';
      document.getElementById('facts-content').innerText = 'Generating facts...';
      switchFilter('all', document.querySelector('.filter-btn'));
      fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=12`, {
        headers: { Authorization: PEXELS_KEY }
      })
        .then(r => r.json())
        .then(d => {
          const imgs = (d.photos || []).map(p => `<img src="${p.src.medium}" onclick="setBG('${p.src.large2x}')">`).join('');
          document.getElementById('all-images-preview').innerHTML = imgs;
          document.getElementById('full-images-grid').innerHTML = imgs;
        })
        .catch(() => {});
    }

    async function loadAppStore() {
      const q = document.getElementById('app-store-search').value.trim().toLowerCase();
      const { data, error } = await sb.from('apps').select('id,name,description,category,icon_url,html,created_at').order('created_at', { ascending: false });
      if (error) {
        document.getElementById('app-store-grid').innerHTML = `<div style="color:#888;">App store failed: ${error.message}</div>`;
        return;
      }

      appCache = (data || []).filter(app => {
        const hay = `${app.name || ''} ${app.description || ''} ${app.category || ''}`.toLowerCase();
        return !q || hay.includes(q);
      });

      document.getElementById('app-store-grid').innerHTML = appCache.length ? appCache.map(app => `
        <div class="store-card" onclick="openApp('${app.id}')">
          <img src="${app.icon_url || '/icon.png'}" alt="">
          <h3>${app.name || 'Untitled App'}</h3>
          <p>${app.description || ''}</p>
          <div class="meta-line">${app.category || 'General'}</div>
        </div>
      `).join('') : `<div style="color:#888;">No apps published yet.</div>`;
    }

    function openApp(id) {
      const app = appCache.find(a => String(a.id) === String(id));
      if (!app) return;
      createNewTab(app.name || 'App', app.html || '<h1>Empty App</h1>', null);
    }

    function toggleWPPicker() {
      const p = document.getElementById('wp-picker');
      p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function setBG(url) {
      document.body.style.backgroundImage = `url('${url}')`;
      localStorage.setItem('horizon_bg', url);
    }

    function resetBG() {
      document.body.style.backgroundImage = 'none';
      localStorage.removeItem('horizon_bg');
    }

    document.getElementById('wp-search').onkeypress = e => {
      if (e.key === 'Enter') {
        fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(e.target.value)}&per_page=20`, {
          headers: { Authorization: PEXELS_KEY }
        })
          .then(r => r.json())
          .then(d => {
            document.getElementById('wp-grid').innerHTML = (d.photos || []).map(p => `<img src="${p.src.medium}" class="wp-item" onclick="setBG('${p.src.large2x}')">`).join('');
          })
          .catch(() => {});
      }
    };

    document.getElementById('addr-bar').onkeypress = e => { if (e.key === 'Enter') handleTopBar(); };
    document.getElementById('search-input').onkeypress = e => { if (e.key === 'Enter') performSearch(); };
    document.getElementById('app-store-search').addEventListener('input', loadAppStore);
  </script>
</body>
</html>

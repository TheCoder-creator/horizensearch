<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon OS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;font-family:system-ui,sans-serif;color:#fff}
.screen{display:none;position:fixed;inset:0;z-index:99999;background:#050505}
.screen.active{display:flex}
#prompt-screen{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(0,235,132,0.04),transparent 60%),#050505;gap:28px;text-align:center;padding:20px}
.prompt-icon{width:80px;height:80px;border-radius:50%;background:rgba(0,235,132,0.1);border:2px solid rgba(0,235,132,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.prompt-title{font-size:28px;font-weight:800}
.prompt-sub{font-size:14px;color:#888;max-width:380px;line-height:1.6}
.prompt-btns{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.prompt-btn{padding:14px 32px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:0.2s;font-family:inherit}
.prompt-btn:hover{transform:scale(1.04)}
.prompt-btn.primary{background:#00eb84;color:#000}
.prompt-btn.primary:hover{filter:brightness(1.15)}
.prompt-btn.secondary{background:rgba(255,255,255,0.06);color:#aaa;border:1px solid #333}
.prompt-btn.secondary:hover{background:rgba(255,255,255,0.1);color:#fff}
.prompt-ver{font-size:11px;color:#444;margin-top:4px;font-family:monospace}
#update-screen{flex-direction:column;align-items:center;justify-content:center;background:#050505}
.update-logo{font-size:3rem;font-weight:900;color:#00eb84;letter-spacing:-2px;margin-bottom:40px;text-shadow:0 0 30px rgba(0,235,132,0.2)}
.update-box{width:min(400px,85vw);text-align:center}
.update-status{font-size:14px;color:#888;margin-bottom:20px;min-height:20px}
.progress-track{width:100%;height:6px;background:#1a1a1a;border-radius:99px;overflow:hidden}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#00eb84,#00d68f);border-radius:99px;transition:width 0.3s linear}
.update-percent{font-size:48px;font-weight:900;color:#fff;margin-top:24px;font-variant-numeric:tabular-nums}
.update-sub{font-size:12px;color:#555;margin-top:8px}
.update-dots span{display:inline-block;width:4px;height:4px;background:#333;border-radius:50%;margin:0 3px;animation:dotPulse 1.5s infinite}
.update-dots span:nth-child(2){animation-delay:.2s}
.update-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
#error-screen{flex-direction:column;align-items:center;justify-content:center;background:#050505;gap:16px;text-align:center;padding:20px}
.error-icon{font-size:40px;color:#ff4d6a}
.error-msg{font-size:14px;color:#888;max-width:360px;line-height:1.6;white-space:pre-line}
.error-btn{padding:12px 28px;background:#00eb84;color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;margin-top:8px;font-family:inherit}
.error-btn:hover{filter:brightness(1.15)}
</style>
</head>
<body>

<div id="prompt-screen" class="screen">
  <div class="prompt-icon"><i class="fas fa-arrow-up-from-bracket"></i></div>
  <div class="prompt-title">Update Found</div>
  <div class="prompt-sub">A new version of Horizon OS is available. Would you like to update now or wait until later?</div>
  <div class="prompt-btns">
    <button class="prompt-btn primary" id="btn-update">Update Now</button>
    <button class="prompt-btn secondary" id="btn-defer">Wait Until Later</button>
  </div>
  <div class="prompt-ver" id="prompt-ver"></div>
</div>

<div id="update-screen" class="screen">
  <div class="update-logo">HORIZON</div>
  <div class="update-box">
    <div class="update-status" id="update-status">Preparing update...</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="update-percent" id="update-percent">0%</div>
    <div class="update-sub">Do not close this tab<div class="update-dots" style="margin-top:8px"><span></span><span></span><span></span></div></div>
  </div>
</div>

<div id="error-screen" class="screen">
  <div class="error-icon"><i class="fas fa-triangle-exclamation"></i></div>
  <div class="error-msg" id="error-msg">Failed to load Horizon OS.</div>
  <button class="error-btn" onclick="location.reload()">Try Again</button>
</div>

<script>
(function(){
  var DB_URL='https://xlisbmtenekjmundxbcn.supabase.co';
  var DB_KEY='sb_publishable_Cvs-AiKPTHrC_tfGfwlpSQ_4Hir5Cva';
  var CHECK_INTERVAL=15000; /* Check every 15 seconds */
  var newCode='',newHash='',oldCode='',oldHash='';
  var checkTimer=null;
  var hasPromptOpen=false;
  var isUpdating=false;

  function hashStr(s){
    var h=0x811c9dc5;
    for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}
    return(h>>>0).toString(16);
  }
  function short(h){return h.substring(0,8).toUpperCase();}

  function show(id){
    var all=document.querySelectorAll('.screen');
    for(var i=0;i<all.length;i++)all[i].classList.remove('active');
    var el=document.getElementById(id);
    if(el)el.classList.add('active');
  }

  function hideAll(){
    if(checkTimer){clearInterval(checkTimer);checkTimer=null;}
    var all=document.querySelectorAll('.screen');
    for(var i=0;i<all.length;i++)all[i].remove();
  }

  function execute(code){
    hideAll();
    try{
      document.open();
      document.write(code);
      document.close();
    }catch(e){
      var html=document.createElement('html');
      html.innerHTML=code;
      document.documentElement.replaceWith(html);
    }
  }

  /* Fetch latest code from the main_code column */
  async function fetchLatest(){
    var res=await fetch(DB_URL+'/rest/v1/search?id=eq.1&select=main_code',{headers:{apikey:DB_KEY}});
    if(!res.ok)throw new Error('Server returned '+res.status);
    var data=await res.json();
    if(!data||!data.length||!data[0].main_code)throw new Error('No code found');
    return data[0].main_code;
  }

  /* Called repeatedly while the app is running */
  async function backgroundCheck(){
    if(hasPromptOpen||isUpdating)return;
    try{
      var code=await fetchLatest();
      var h=hashStr(code);
      var current=localStorage.getItem('hz_cached_hash')||'';
      if(current&&current!==h){
        var deferred=localStorage.getItem('hz_deferred_hash')||'';
        if(deferred===h){
          /* Already deferred this one, don't ask again */
          return;
        }
        newCode=code;
        newHash=h;
        oldCode=localStorage.getItem('hz_cached_code')||'';
        oldHash=current;
        hasPromptOpen=true;
        document.getElementById('prompt-ver').textContent='v'+short(oldHash)+' \u2192 v'+short(newHash);
        show('prompt-screen');
      }
    }catch(e){}
  }

  /* Inject the background checker into the loaded code */
  function injectChecker(code){
    var checkerScript='<'+'script>\n'+
    '(function(){\n'+
    '  var DB_URL="'+DB_URL+'";\n'+
    '  var DB_KEY="'+DB_KEY+'";\n'+
    '  var CHECK_INTERVAL='+CHECK_INTERVAL+';\n'+
    '  var _hzCheckTimer=null;\n'+
    '  function _hzHash(s){var h=0x811c9dc5;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}return(h>>>0).toString(16);}\n'+
    '  function _hzShort(h){return h.substring(0,8).toUpperCase();}\n'+
    '  async function _hzBgCheck(){\n'+
    '    try{\n'+
    '      var r=await fetch(DB_URL+"/rest/v1/search?id=eq.1&select=main_code",{headers:{apikey:DB_KEY}});\n'+
    '      var d=await r.json();\n'+
    '      if(!d||!d.length||!d[0].main_code)return;\n'+
    '      var code=d[0].main_code;\n'+
    '      var h=_hzHash(code);\n'+
    '      var cur=localStorage.getItem("hz_cached_hash")||"";\n'+
    '      if(cur&&cur!==h){\n'+
    '        var def=localStorage.getItem("hz_deferred_hash")||"";\n'+
    '        if(def===h)return;\n'+
    '        if(_hzCheckTimer){clearInterval(_hzCheckTimer);_hzCheckTimer=null;}\n'+
    '        _hzShowPrompt(code,h,cur);\n'+
    '      }\n'+
    '    }catch(e){}\n'+
    '  }\n'+
    '  function _hzShowPrompt(code,newH,oldH){\n'+
    '    var ov=document.createElement("div");\n'+
    '    ov.id="_hz-ov";\n'+
    '    ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)";\n'+
    '    ov.innerHTML=\'<div style="background:#0e0e14;border:1px solid rgba(0,235,132,0.3);border-radius:20px;padding:36px;max-width:440px;width:90%;text-align:center">\'+\n'+
    '      \'<div style="width:64px;height:64px;border-radius:50%;background:rgba(0,235,132,0.1);border:2px solid rgba(0,235,132,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px;color:#00eb84"><i class="fas fa-arrow-up-from-bracket"></i></div>\'+\n'+
    '      \'<div style="font-size:22px;font-weight:800;margin-bottom:10px">Update Found</div>\'+\n'+
    '      \'<div style="font-size:13px;color:#888;margin-bottom:6px">A new version is available. Update now or later?</div>\'+\n'+
    '      \'<div style="font-size:11px;color:#444;font-family:monospace;margin-bottom:20px">v\'+_hzShort(oldH)+\' \\u2192 v\'+_hzShort(newH)+\'</div>\'+\n'+
    '      \'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">\'+\n'+
    '      \'<button id="_hz-do-update" style="padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:#00eb84;color:#000;font-family:inherit">Update Now</button>\'+\n'+
    '      \'<button id="_hz-do-defer" style="padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid #333;background:rgba(255,255,255,0.06);color:#aaa;font-family:inherit">Wait Until Later</button>\'+\n'+
    '      \'</div></div>\';\n'+
    '    document.body.appendChild(ov);\n'+
    '    document.getElementById("_hz-do-update").onclick=function(){_hzStartUpdate(code,newH,ov);};\n'+
    '    document.getElementById("_hz-do-defer").onclick=function(){localStorage.setItem("hz_deferred_hash",newH);ov.remove();};\n'+
    '  }\n'+
    '  function _hzStartUpdate(code,newH,ov){\n'+
    '    ov.innerHTML=\'<div style="background:#0e0e14;border:1px solid rgba(0,235,132,0.3);border-radius:20px;padding:36px;max-width:400px;width:90%;text-align:center">\'+\n'+
    '      \'<div style="font-size:2.5rem;font-weight:900;color:#00eb84;letter-spacing:-2px;margin-bottom:30px">HORIZON</div>\'+\n'+
    '      \'<div id="_hz-upd-status" style="font-size:13px;color:#888;margin-bottom:16px">Preparing update...</div>\'+\n'+
    '      \'<div style="width:100%;height:5px;background:#1a1a1a;border-radius:99px;overflow:hidden"><div id="_hz-upd-fill" style="width:0%;height:100%;background:linear-gradient(90deg,#00eb84,#00d68f);border-radius:99px;transition:width 0.3s linear"></div></div>\'+\n'+
    '      \'<div id="_hz-upd-pct" style="font-size:42px;font-weight:900;margin-top:20px;font-variant-numeric:tabular-nums">0%</div>\'+\n'+
    '      \'<div style="font-size:11px;color:#555;margin-top:8px">Do not close this tab</div></div>\';\n'+
    '    var fill=document.getElementById("_hz-upd-fill");\n'+
    '    var pct=document.getElementById("_hz-upd-pct");\n'+
    '    var st=document.getElementById("_hz-upd-status");\n'+
    '    var el=0,tot=60;\n'+
    '    var ph=[{a:0,t:"Preparing update..."},{a:15,t:"Downloading components..."},{a:35,t:"Applying changes..."},{a:55,t:"Finalizing..."},{a:80,t:"Almost done..."},{a:95,t:"Completing update..."}];\n'+
    '    var iv=setInterval(function(){\n'+
    '      el+=0.3;var p=Math.min(Math.round((el/tot)*100),100);\n'+
    '      fill.style.width=p+"%";pct.textContent=p+"%";\n'+
    '      for(var i=ph.length-1;i>=0;i--){if(p>=ph[i].a){st.textContent=ph[i].t;break;}}\n'+
    '      if(el>=tot){clearInterval(iv);fill.style.width="100%";pct.textContent="100%";st.textContent="Update complete!";\n'+
    '        setTimeout(function(){localStorage.setItem("hz_cached_code",code);localStorage.setItem("hz_cached_hash",newH);localStorage.removeItem("hz_deferred_hash");document.open();document.write(code);document.close();},600);}\n'+
    '    },300);\n'+
    '  }\n'+
    '  _hzCheckTimer=setInterval(_hzBgCheck,CHECK_INTERVAL);\n'+
    '})();\n'+
    '</'+'script>';

    /* Inject the checker right before </body> or at the end */
    if(code.indexOf('</body>')!==-1){
      return code.replace('</body>',checkerScript+'\n</body>');
    }
    return code+checkerScript;
  }

  /* Wire up buttons */
  document.getElementById('btn-update').addEventListener('click',function(){
    isUpdating=true;
    show('update-screen');
    var fill=document.getElementById('progress-fill');
    var pct=document.getElementById('update-percent');
    var status=document.getElementById('update-status');
    var elapsed=0,total=60;
    var phases=[{at:0,t:'Preparing update...'},{at:15,t:'Downloading components...'},{at:35,t:'Applying changes...'},{at:55,t:'Finalizing...'},{at:80,t:'Almost done...'},{at:95,t:'Completing update...'}];

    var iv=setInterval(function(){
      elapsed+=0.3;
      var p=Math.min(Math.round((elapsed/total)*100),100);
      fill.style.width=p+'%';
      pct.textContent=p+'%';
      for(var i=phases.length-1;i>=0;i--){if(p>=phases[i].at){status.textContent=phases[i].t;break;}}
      if(elapsed>=total){
        clearInterval(iv);
        fill.style.width='100%';pct.textContent='100%';status.textContent='Update complete!';
        setTimeout(function(){
          localStorage.setItem('hz_cached_code',newCode);
          localStorage.setItem('hz_cached_hash',newHash);
          localStorage.removeItem('hz_deferred_hash');
          execute(newCode);
        },600);
      }
    },300);
  });

  document.getElementById('btn-defer').addEventListener('click',function(){
    hasPromptOpen=false;
    localStorage.setItem('hz_deferred_hash',newHash);
    execute(oldCode);
  });

  async function init(){
    try{
      var code=await fetchLatest();
      newHash=hashStr(code);
      newCode=code;

      oldCode=localStorage.getItem('hz_cached_code')||'';
      oldHash=localStorage.getItem('hz_cached_hash')||'';

      /* No cache → save, inject checker, run */
      if(!oldCode){
        localStorage.setItem('hz_cached_code',code);
        localStorage.setItem('hz_cached_hash',newHash);
        localStorage.removeItem('hz_deferred_hash');
        execute(injectChecker(code));
        return;
      }

      /* Same version → inject checker into cached code and run */
      if(oldHash===newHash){
        execute(injectChecker(oldCode));
        return;
      }

      /* Deferred this update before → auto-update */
      var deferred=localStorage.getItem('hz_deferred_hash')||'';
      if(deferred===newHash){
        localStorage.setItem('hz_cached_code',code);
        localStorage.setItem('hz_cached_hash',newHash);
        localStorage.removeItem('hz_deferred_hash');
        execute(injectChecker(code));
        return;
      }

      /* New version on first load → show prompt */
      document.getElementById('prompt-ver').textContent='v'+short(oldHash)+' \u2192 v'+short(newHash);
      show('prompt-screen');

    }catch(e){
      oldCode=localStorage.getItem('hz_cached_code')||'';
      if(oldCode){execute(injectChecker(oldCode));return;}
      document.getElementById('error-msg').textContent='Failed to load Horizon OS.\n\n'+e.message;
      show('error-screen');
    }
  }

  init();
})();
</script>
</body>
</html>

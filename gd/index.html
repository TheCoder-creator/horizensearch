        // Identical fingerprint to Horizon OS
        async function generateFingerprint() {
            let raw = '';
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('HorizonFP_fingerprint_test', 2, 2);
                ctx.beginPath();
                ctx.arc(50, 50, 50, 0, Math.PI * 2, false);
                ctx.fill();
                raw += canvas.toDataURL();
            } catch (e) {}
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        raw += gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        raw += gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {}
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                raw += audioCtx.sampleRate + audioCtx.destination.maxChannelCount + audioCtx.state;
                audioCtx.close();
            } catch (e) {}
            try {
                if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    let deviceCounts = { audioinput: 0, audiooutput: 0, videoinput: 0 };
                    devices.forEach(d => { if (deviceCounts[d.kind] !== undefined) deviceCounts[d.kind]++; });
                    raw += JSON.stringify(deviceCounts);
                }
            } catch (e) {}
            raw += navigator.hardwareConcurrency || 'na';
            raw += screen.width + 'x' + screen.height;
            raw += screen.colorDepth;
            raw += (navigator.deviceMemory || 'na');
            raw += (navigator.platform || 'na');
            raw += new Date().getTimezoneOffset();
            raw += navigator.language;
            raw += Intl.DateTimeFormat().resolvedOptions().timeZone;
            raw += (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            try {
                if (navigator.userAgentData) {
                    const hints = await navigator.userAgentData.getHighEntropyValues([
                        'platform', 'platformVersion', 'architecture', 'model', 'bitness', 'fullVersionList'
                    ]);
                    raw += JSON.stringify(hints);
                } else {
                    raw += navigator.userAgent;
                }
            } catch (e) {
                raw += navigator.userAgent;
            }
            let hash1 = 0x811c9dc5;
            for (let i = 0; i < raw.length; i++) {
                hash1 ^= raw.charCodeAt(i);
                hash1 = Math.imul(hash1, 0x01000193);
            }
            let hash2 = 0x811c9dc5;
            const reversedRaw = raw.split('').reverse().join('');
            for (let i = 0; i < reversedRaw.length; i++) {
                hash2 ^= reversedRaw.charCodeAt(i);
                hash2 = Math.imul(hash2, 0x01000193);
            }
            const combinedHash = (hash1 >>> 0).toString(16) + (hash2 >>> 0).toString(16);
            return `hz-pc-${combinedHash.toUpperCase().substring(0, 16)}`;
        }

        async function hzCheckIfBlocked(computerId) {
            try {
                const res = await fetch(`${HZ_URL}/rest/v1/users?computer_id=eq.${encodeURIComponent(computerId)}&select=is_blocked`, {
                    headers: { 'apikey': HZ_KEY }
                });
                const data = await res.json();
                if (data.length > 0 && data[0].is_blocked === true) {
                    window.location.replace('https://blocked.horizensearch.com');
                    return true;
                }
            } catch (e) {}
            return false;
        }

        (async function() {
            let computerId = localStorage.getItem('horizen_computer_id');
            if (!computerId) {
                computerId = await generateFingerprint();
                localStorage.setItem('horizen_computer_id', computerId);
            }

            hzMyAddress = computerId;
            const txtEl = document.getElementById('hz-addr-text');
            if (txtEl) txtEl.innerText = computerId;

            // 1. Register if new (upsert — no extra columns needed)
            try {
                await fetch(`${HZ_URL}/rest/v1/users`, {
                    method: 'POST',
                    headers: {
                        'apikey': HZ_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'resolution=ignore-duplicates,return=minimal'
                    },
                    body: JSON.stringify({ computer_id: computerId, nickname: 'Unknown', is_blocked: false })
                });
            } catch (e) {}

            // 2. Initial block check
            const blocked = await hzCheckIfBlocked(computerId);
            if (blocked) return;

            // 3. Remove block wall — safe to play
            document.getElementById('hz-block-wall').style.display = 'none';

            // 4. Poll every 2 seconds
            hzPollInterval = setInterval(() => hzCheckIfBlocked(computerId), 2000);
        })();

    <script src="Build/UnityLoader.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", { onProgress: UnityProgress });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) { return; }
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progressBar = document.querySelector("#loader .progress");
                progressBar.style.display = "block";
                gameInstance.progress = progressBar.querySelector(".full");
                loader.querySelector(".spinner").style.display = "none";
            }
            gameInstance.progress.style.transform = `scaleX(${progress})`;
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function () { loader.style.display = "none"; }, 2000);
            }
        }

        function toggleModes() {
            const menu = document.getElementById("modeMenu");
            if (menu.style.display === "flex") { menu.style.display = "none"; }
            else { menu.style.display = "flex"; }
        }

        function hzCopyAddress() {
            navigator.clipboard.writeText(hzMyAddress).then(() => {
                const el = document.getElementById('hz-addr-text');
                el.innerText = 'Copied!';
                setTimeout(() => { el.innerText = hzMyAddress; }, 1500);
            });
        }
    </script>
